<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Registro de Sono</title>
<style>
  :root {
    --bg-noite: #11151c;
    --bg-noite-2: #1a2030;
    --azul-dormir: #5b7fb8;
    --azul-dormir-hover: #6f93c9;
    --ambar-acordar: #d9a05b;
    --ambar-acordar-hover: #e3b173;
    --texto: #e8ecf2;
    --texto-fraco: #7a8699;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(ellipse at top, var(--bg-noite-2), var(--bg-noite));
    color: var(--texto);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: stretch;
  }

  .relogio {
    text-align: center;
    font-size: 15px;
    letter-spacing: 0.05em;
    color: var(--texto-fraco);
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }

  button.evento {
    border: none;
    border-radius: 22px;
    padding: 38px 24px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: #14181f;
    -webkit-tap-highlight-color: transparent;
  }

  button.evento:active {
    transform: scale(0.97);
  }

  .btn-dormir {
    background: linear-gradient(160deg, var(--azul-dormir), #43608c);
    color: #eef2f9;
    box-shadow: 0 8px 24px -8px rgba(91, 127, 184, 0.5);
  }
  .btn-dormir:hover { background: linear-gradient(160deg, var(--azul-dormir-hover), #4d6da0); }

  .btn-acordar {
    background: linear-gradient(160deg, var(--ambar-acordar), #b8793b);
    color: #221a0f;
    box-shadow: 0 8px 24px -8px rgba(217, 160, 91, 0.5);
  }
  .btn-acordar:hover { background: linear-gradient(160deg, var(--ambar-acordar-hover), #c4863f); }

  .icone {
    font-size: 26px;
    line-height: 1;
  }

  .status {
    text-align: center;
    font-size: 14px;
    color: var(--texto-fraco);
    min-height: 20px;
    transition: opacity 0.3s ease;
  }

  .status.sucesso { color: #8fd19e; }
  .status.erro { color: #e08585; }

  button.evento:disabled {
    opacity: 0.5;
    cursor: default;
  }
</style>
</head>
<body>

<div class="container">
  <div class="relogio" id="relogio">--:--:--</div>

  <button class="evento btn-dormir" id="btnDormir">
    <span class="icone">🌙</span> Dormir
  </button>

  <button class="evento btn-acordar" id="btnAcordar">
    <span class="icone">☀️</span> Acordar
  </button>

  <div class="status" id="status">&nbsp;</div>
</div>

<script>
  // Cole aqui a URL do seu Apps Script publicado (termina em /exec)
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby6ukwbMPEhchVadgN6LVmbrFbrmWkf562hfKAmM9YwTVjnPEgnGB8KH7wOjtsrBshD/exec";

  const relogio = document.getElementById('relogio');
  const status = document.getElementById('status');
  const btnDormir = document.getElementById('btnDormir');
  const btnAcordar = document.getElementById('btnAcordar');

  function atualizarRelogio() {
    const agora = new Date();
    relogio.textContent = agora.toLocaleTimeString('pt-BR');
  }
  setInterval(atualizarRelogio, 1000);
  atualizarRelogio();

  function definirStatus(texto, classe) {
    status.textContent = texto;
    status.className = 'status' + (classe ? ' ' + classe : '');
  }

  async function registrarEvento(tipo, botao) {
    if (URL_SCRIPT.includes('COLE_AQUI')) {
      definirStatus('Configure a URL do Apps Script no código.', 'erro');
      return;
    }

    btnDormir.disabled = true;
    btnAcordar.disabled = true;
    definirStatus('Enviando...');

    try {
      // mode no-cors porque o Apps Script /exec costuma redirecionar
      // e o navegador bloqueia a leitura da resposta entre domínios;
      // não conseguimos ler o JSON de volta, mas o registro é gravado.
      await fetch(`${URL_SCRIPT}?tipo=${tipo}`, { method: 'GET', mode: 'no-cors' });
      const agora = new Date().toLocaleTimeString('pt-BR');
      definirStatus(`Registrado: ${tipo === 'dormir' ? 'Dormir' : 'Acordar'} às ${agora}`, 'sucesso');
    } catch (err) {
      definirStatus('Erro ao enviar. Verifique sua conexão.', 'erro');
    } finally {
      btnDormir.disabled = false;
      btnAcordar.disabled = false;
    }
  }

  btnDormir.addEventListener('click', () => registrarEvento('dormir', btnDormir));
  btnAcordar.addEventListener('click', () => registrarEvento('acordar', btnAcordar));
</script>

</body>
</html>
